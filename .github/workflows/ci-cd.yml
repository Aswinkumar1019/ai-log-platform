name: CI/CD Pipeline - AI Log Analyzer

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./ai-analyzer
        push: true
        tags: |
          aswinkumar07/ai-log-analyzer:latest
          aswinkumar07/ai-log-analyzer:${{ github.sha }}

    - name: Notify Discord on Success
      if: success()
      run: |
        curl -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d "{\"content\": \"✅ CI/CD Pipeline SUCCESS! New image pushed: aswinkumar07/ai-log-analyzer:${{ github.sha }}\"}"

    - name: Notify Discord on Failure
      if: failure()
      run: |
        curl -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d "{\"content\": \"❌ CI/CD Pipeline FAILED! Check GitHub Actions for details.\"}"
