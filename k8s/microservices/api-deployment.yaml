apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  namespace: microservices
  labels:
    app: api-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-service
  template:
    metadata:
      labels:
        app: api-service
    spec:
      containers:
      - name: api-service
        image: python:3.9-slim
        command: ["python", "-c"]
        args:
        - |
          import time, random, logging
          logging.basicConfig(
            format='%(asctime)s %(levelname)s %(message)s',
            level=logging.DEBUG
          )
          logger = logging.getLogger('api-service')
          messages = [
            ("INFO", "Request received: GET /api/users"),
            ("INFO", "Database query executed in 45ms"),
            ("WARNING", "Response time high: 1200ms"),
            ("ERROR", "Connection timeout to database"),
            ("ERROR", "Memory usage at 89% - approaching limit"),
            ("INFO", "Cache hit ratio: 94%"),
            ("WARNING", "Retrying failed request attempt 2/3"),
            ("ERROR", "Unhandled exception in payment service"),
          ]
          while True:
            level, msg = random.choice(messages)
            if level == "INFO": logger.info(msg)
            elif level == "WARNING": logger.warning(msg)
            elif level == "ERROR": logger.error(msg)
            time.sleep(random.uniform(1, 4))
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: microservices
spec:
  selector:
    app: api-service
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP
